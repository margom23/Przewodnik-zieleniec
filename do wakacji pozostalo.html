<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Odliczanie do wakacji</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://cdn.galleries.smcloud.net/t/galleries/gf-Xu2M-LFyo-B3tb_planujesz-wakacje-2026-jesienia-i-zima-sprawdz-jakie-kierunki-wybrac-664x442.jpg");
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            z-index: -1;
        }

        .countdown {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px 40px;
            border-radius: 15px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2em;
        }

        #timer {
            font-size: 1.6em;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="countdown">
    <h1>Do wakacji pozostało...</h1>
    <div id="timer">Ładowanie...</div>
</div>

<script>
    function getNextVacationDate() {
        const now = new Date();
        let year = now.getFullYear();
        let vacation = new Date(year, 5, 26, 11, 0, 0); // 26 czerwca, 11:00

        if (now > vacation) {
            vacation = new Date(year + 1, 5, 26, 11, 0, 0);
        }
        return vacation;
    }

    const vacationDate = getNextVacationDate();

    function updateCountdown() {
        const now = new Date();
        const diff = vacationDate - now;

        if (diff <= 0) {
            document.getElementById("timer").textContent = "WAKACJE! 🎉";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("timer").textContent =
            `${days} dni ${hours} godz. ${minutes} min ${seconds} sek`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>
